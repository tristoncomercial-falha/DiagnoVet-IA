document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

line><\u002Fsvg><\u002Fspan>\n        <\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"faq-a-inner\">\n          Não. Você cria a conta, ganha <strong>7 dias com 10 análises por dia<\u002Fstrong> e só decide assinar depois — se quiser continuar.\n        <\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" aria-expanded=\"false\">\n          Quais tipos de exame o app interpreta?\n          <span class=\"faq-icon\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.8\" stroke-linecap=\"round\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"><\u002Fline><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><\u002Fsvg><\u002Fspan>\n        <\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"faq-a-inner\">\n          Hemograma, bioquímica sérica, urinálise, citologia (incl. citologia vaginal), painel hormonal (T4/TSH, cortisol, ACTH, progesterona), perfil cardíaco (NT-proBNP, troponina), eletroforese de proteínas e mais. <strong>Continuamos expandindo<\u002Fstrong> a cada release.\n        <\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" aria-expanded=\"false\">\n          E se eu não usar todas as análises do mês?\n          <span class=\"faq-icon\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.8\" stroke-linecap=\"round\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"><\u002Fline><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><\u002Fsvg><\u002Fspan>\n        <\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"faq-a-inner\">\n          As análises são por mês — não acumulam. Mas você pode <strong>fazer downgrade<\u002Fstrong> ou cancelar a qualquer momento dentro do app.\n        <\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" aria-expanded=\"false\">\n          Os dados dos meus pacientes ficam seguros?\n          <span class=\"faq-icon\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.8\" stroke-linecap=\"round\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"><\u002Fline><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><\u002Fsvg><\u002Fspan>\n        <\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"faq-a-inner\">\n          Sim. Dados ficam armazenados com <strong>criptografia em trânsito e em repouso<\u002Fstrong>. Você controla quem acessa sua conta. Estamos em conformidade com a LGPD pra dados clínicos veterinários.\n        <\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"faq-item\">\n        <button class=\"faq-q\" aria-expanded=\"false\">\n          Como cancelo a assinatura?\n          <span class=\"faq-icon\"><svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.8\" stroke-linecap=\"round\"><line x1=\"12\" y1=\"5\" x2=\"12\" y2=\"19\"><\u002Fline><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><\u002Fsvg><\u002Fspan>\n        <\u002Fbutton>\n        <div class=\"faq-a\"><div class=\"faq-a-inner\">\n          Direto pelo app, em <strong>Configurações → Minha Conta → Cancelar<\u002Fstrong>. Sem ligação, sem letra miúda. Seus pacientes e laudos ficam preservados caso volte depois.\n        <\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══════════════ FINAL CTA ═══════════════ -->\n<section class=\"cta\">\n  <div class=\"cta-orb cta-orb-1\"><\u002Fdiv>\n  <div class=\"cta-orb cta-orb-2\"><\u002Fdiv>\n  <div class=\"cta-inner\">\n    <h2 class=\"reveal\">Cada minuto importa.<br><em>Comece agora.<\u002Fem><\u002Fh2>\n    <p class=\"reveal\" data-d=\"1\">Crie sua conta, importe o primeiro exame e ganhe horas de volta no seu próximo plantão.<\u002Fp>\n    <div class=\"cta-ctas reveal\" data-d=\"2\">\n      <a href=\"https://tristoncomercial-falha.github.io/DiagnoVet-IA/\" target=\"_blank\" rel=\"noopener\" class=\"btn btn-primary btn-xl\" data-ripple=\"\">\n        Acessar DiagnoVet IA\n        <svg class=\"arrow\" width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\" stroke-linecap=\"round\"><line x1=\"5\" y1=\"12\" x2=\"19\" y2=\"12\"><\u002Fline><polyline points=\"12 5 19 12 12 19\"><\u002Fpolyline><\u002Fsvg>\n      <\u002Fa>\n      <a href=\"#planos\" class=\"btn btn-outline-light btn-xl\">Ver planos novamente<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ═══════════════ FOOTER ═══════════════ -->\n<footer>\n  <div class=\"foot-inner\">\n    <div class=\"foot-brand\">\n      <span class=\"foot-brand-mark\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\">\n          <circle cx=\"9.5\" cy=\"5.2\" r=\"2.4\" fill=\"white\" opacity=\".98\"><\u002Fcircle>\n          <circle cx=\"14.5\" cy=\"5.2\" r=\"2.4\" fill=\"white\" opacity=\".98\"><\u002Fcircle>\n          <circle cx=\"5.8\" cy=\"9.4\" r=\"1.9\" fill=\"white\" opacity=\".92\"><\u002Fcircle>\n          <circle cx=\"18.2\" cy=\"9.4\" r=\"1.9\" fill=\"white\" opacity=\".92\"><\u002Fcircle>\n          <ellipse cx=\"12\" cy=\"16\" rx=\"5.5\" ry=\"4.2\" fill=\"white\" opacity=\".98\"><\u002Fellipse>\n        <\u002Fsvg>\n      <\u002Fspan>\n      Diagno<em>Vet IA<\u002Fem>\n    <\u002Fdiv>\n    <div class=\"foot-stamp\"><span>·<\u002Fspan> VitaHub Solutions · Brasil 2026<\u002Fdiv>\n    <div class=\"foot-disclaim\">\n      DiagnoVet IA é uma ferramenta de <strong>suporte à decisão clínica veterinária<\u002Fstrong> e não substitui o julgamento profissional. A responsabilidade pelo diagnóstico, prescrição e conduta é sempre do médico-veterinário responsável.\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n/* ────────── NAV SCROLLED ────────── */\nconst nav = document.getElementById('nav');\nconst onScroll = () => nav.classList.toggle('scrolled', window.scrollY > 8);\nwindow.addEventListener('scroll', onScroll, {passive:true});\nonScroll();\n\n/* ────────── REVEAL ON SCROLL ────────── */\nconst io = new IntersectionObserver((entries)=>{\n  entries.forEach(e=>{\n    if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); }\n  });\n},{threshold:.12, rootMargin:'0px 0px -60px 0px'});\ndocument.querySelectorAll('.reveal').forEach(el=>io.observe(el));\n\n/* ────────── BUTTON RIPPLES ────────── */\ndocument.querySelectorAll('[data-ripple]').forEach(btn=>{\n  btn.addEventListener('click', (e)=>{\n    const r = btn.getBoundingClientRect();\n    const ripple = document.createElement('span');\n    ripple.className = 'ripple';\n    const size = Math.max(r.width, r.height);\n    ripple.style.width = ripple.style.height = size + 'px';\n    ripple.style.left = (e.clientX - r.left - size/2) + 'px';\n    ripple.style.top = (e.clientY - r.top - size/2) + 'px';\n    btn.appendChild(ripple);\n    setTimeout(()=>ripple.remove(), 650);\n  });\n});\n\n/* ────────── BILLING TOGGLE ────────── */\nconst billBtns = document.querySelectorAll('.bill-toggle button');\nconst billThumb = document.getElementById('bill-thumb');\nfunction positionBillThumb(){\n  const on = document.querySelector('.bill-toggle button.on');\n  if(!on) return;\n  const parent = on.parentElement.getBoundingClientRect();\n  const r = on.getBoundingClientRect();\n  billThumb.style.left = (r.left - parent.left) + 'px';\n  billThumb.style.width = r.width + 'px';\n}\nfunction setBill(mode){\n  billBtns.forEach(b=>b.classList.toggle('on', b.dataset.bill===mode));\n  positionBillThumb();\n  document.querySelectorAll('.pl-card').forEach(card=>{\n    const priceEl = card.querySelector('.pl-price');\n    const wasEl = card.querySelector('.pl-was');\n    const totEl = card.querySelector('.pl-total');\n    if(priceEl && priceEl.dataset.priceM){\n      priceEl.style.opacity = '.3';\n      setTimeout(()=>{\n        priceEl.textContent = mode==='monthly' ? priceEl.dataset.priceM : priceEl.dataset.priceQ;\n        priceEl.style.opacity = '1';\n      }, 120);\n    }\n    if(wasEl){\n      const v = mode==='monthly' ? (wasEl.dataset.wasM||'') : (wasEl.dataset.wasQ||'');\n      wasEl.textContent = v;\n    }\n    if(totEl){\n      const v = mode==='monthly' ? (totEl.dataset.totM||'') : (totEl.dataset.totQ||'');\n      totEl.textContent = v;\n    }\n  });\n}\nbillBtns.forEach(b=> b.addEventListener('click', ()=> setBill(b.dataset.bill)));\nwindow.addEventListener('load', positionBillThumb);\nwindow.addEventListener('resize', positionBillThumb);\npositionBillThumb();\n\n/* ────────── FAQ ACCORDION ────────── */\ndocument.querySelectorAll('.faq-item').forEach(item=>{\n  const q = item.querySelector('.faq-q');\n  const a = item.querySelector('.faq-a');\n  q.addEventListener('click', ()=>{\n    const isOpen = item.classList.contains('open');\n    // close others\n    document.querySelectorAll('.faq-item.open').forEach(other=>{\n      if(other!==item){\n        other.classList.remove('open');\n        const oa = other.querySelector('.faq-a');\n        oa.style.maxHeight = '0px';\n        other.querySelector('.faq-q').setAttribute('aria-expanded','false');\n      }\n    });\n    if(isOpen){\n      item.classList.remove('open');\n      a.style.maxHeight = '0px';\n      q.setAttribute('aria-expanded','false');\n    } else {\n      item.classList.add('open');\n      a.style.maxHeight = a.scrollHeight + 'px';\n      q.setAttribute('aria-expanded','true');\n    }\n  });\n});\n\n/* ────────── HERO MOCK SUBTLE PARALLAX ────────── */\nconst mock = document.querySelector('.mock-card');\nconst heroMock = document.querySelector('.hero-mock');\nif(mock && heroMock && window.matchMedia('(pointer:fine)').matches){\n  heroMock.addEventListener('mousemove', (e)=>{\n    const r = heroMock.getBoundingClientRect();\n    const px = (e.clientX - r.left) / r.width - .5;\n    const py = (e.clientY - r.top) / r.height - .5;\n    mock.style.transform = `rotateY(${-8 + px*8}deg) rotateX(${4 - py*6}deg)`;\n  });\n  heroMock.addEventListener('mouseleave', ()=>{\n    mock.style.transform = '';\n  });\n}\n\n/* ────────── SMOOTH ANCHOR LINKS ────────── */\ndocument.querySelectorAll('a[href^=\"#\"]').forEach(a=>{\n  a.addEventListener('click',(e)=>{\n    const id = a.getAttribute('href');\n    if(id.length>1){\n      const target = document.querySelector(id);\n      if(target){\n        e.preventDefault();\n        target.scrollIntoView({behavior:'smooth', block:'start'});\n      }\n    }\n  });\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
